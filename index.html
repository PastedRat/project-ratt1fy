<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>project RATT1FY</title>
  <style>
    :root {
      --lime-1: #d7ff3e;
      --lime-2: #97ff00;
      --lime-3: #55ff3a;
      --bg-1: #050805;
      --bg-2: #0a1407;
      --text: #eeffd5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(151, 255, 0, 0.2) 0, transparent 45%),
        radial-gradient(circle at 80% 10%, rgba(85, 255, 58, 0.16) 0, transparent 35%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      overflow: hidden;
    }

    .preloader {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, #060a05, #111f09);
      z-index: 20;
      animation: vanish 1s ease 1.8s forwards;
    }

    .loader-ring {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid rgba(151, 255, 0, 0.2);
      border-top-color: var(--lime-2);
      box-shadow: 0 0 30px rgba(151, 255, 0, 0.65);
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes vanish {
      to { opacity: 0; visibility: hidden; pointer-events: none; }
    }

    .hero {
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 2rem;
      opacity: 0;
      transform: translateY(20px) scale(0.98);
      animation: intro 1.1s cubic-bezier(.2,.8,.2,1) 0.4s forwards;
      position: relative;
      z-index: 3;
    }

    @keyframes intro {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 8vw, 5.8rem);
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--lime-1), var(--lime-2), var(--lime-3));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 24px rgba(151, 255, 0, 0.35);
      animation: glowPulse 2.5s ease-in-out infinite;
    }

    @keyframes glowPulse {
      50% { text-shadow: 0 0 35px rgba(151, 255, 0, 0.8); }
    }

    p {
      max-width: 740px;
      margin: 1rem auto;
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: #f0ffd8;
      text-wrap: balance;
      opacity: 0.92;
    }

    .accent {
      color: #c9ff60;
      font-weight: 600;
    }

    .btn {
      margin-top: 1.2rem;
      padding: 0.95rem 1.7rem;
      border-radius: 999px;
      border: 1px solid rgba(151, 255, 0, 0.55);
      color: #ecffc7;
      background: rgba(151, 255, 0, 0.12);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
      backdrop-filter: blur(5px);
    }

    .btn:hover {
      transform: translateY(-2px);
      background: rgba(151, 255, 0, 0.18);
      box-shadow: 0 10px 24px rgba(151, 255, 0, 0.32);
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(12px);
      pointer-events: none;
      z-index: 1;
      animation: drift 10s ease-in-out infinite;
    }

    .orb.one {
      width: 180px;
      height: 180px;
      background: rgba(151, 255, 0, 0.3);
      left: 8vw;
      top: 16vh;
    }

    .orb.two {
      width: 240px;
      height: 240px;
      background: rgba(85, 255, 58, 0.25);
      right: 10vw;
      bottom: 13vh;
      animation-delay: -3.5s;
    }

    @keyframes drift {
      50% { transform: translateY(-18px) translateX(12px) scale(1.06); }
    }

    dialog {
      width: min(680px, 90vw);
      border: 1px solid rgba(151, 255, 0, 0.45);
      border-radius: 18px;
      background: rgba(7, 12, 6, 0.94);
      color: #ecffd4;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.55);
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(2px);
    }

    .dialog-content h2 {
      margin: 0 0 0.6rem;
      color: #cbff74;
    }

    .close {
      margin-top: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="preloader" aria-hidden="true">
    <div class="loader-ring"></div>
  </div>

  <div class="orb one"></div>
  <div class="orb two"></div>

  <main class="hero">
    <section>
      <h1>project RATT1FY</h1>
      <p>
        We are an <span class="accent">upcoming project with RARS</span> currently building for the future.
        This will be build till 10th may
      </p>
      <button class="btn" id="moreInfoBtn">More info</button>
    </section>
  </main>

  <audio id="bgMusic" src="music.mp3" loop autoplay></audio>

  <dialog id="infoDialog">
    <div class="dialog-content">
      <h2>More Info</h2>
      <p>
        This project is heavily in WIP info will NOT be announced!
      </p>
      <button class="btn close" id="closeDialogBtn">Close</button>
    </div>
  </dialog>

  <script>
    const moreInfoBtn = document.getElementById('moreInfoBtn');
    const infoDialog = document.getElementById('infoDialog');
    const closeDialogBtn = document.getElementById('closeDialogBtn');
    const bgMusic = document.getElementById('bgMusic');

    moreInfoBtn.addEventListener('click', () => infoDialog.showModal());
    closeDialogBtn.addEventListener('click', () => infoDialog.close());

    const tryPlay = async () => {
      try {
        await bgMusic.play();
      } catch {
        const unlock = async () => {
          try { await bgMusic.play(); } catch {}
          window.removeEventListener('click', unlock);
          window.removeEventListener('keydown', unlock);
          window.removeEventListener('touchstart', unlock);
        };
        window.addEventListener('click', unlock, { once: true });
        window.addEventListener('keydown', unlock, { once: true });
        window.addEventListener('touchstart', unlock, { once: true });
      }
    };

    window.addEventListener('load', tryPlay);
  </script>
</body>
</html>
